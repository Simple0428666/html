<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像头拍照应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
        }
        
        .camera-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 4/3;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        #cameraFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .camera-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(30, 30, 40, 0.9);
            gap: 20px;
            padding: 20px;
            text-align: center;
        }
        
        .camera-placeholder p {
            font-size: 1.2rem;
            max-width: 300px;
            line-height: 1.6;
        }
        
        .preview-container {
            display: none;
            flex-direction: column;
            gap: 15px;
            background: rgba(40, 40, 50, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .preview-container.active {
            display: flex;
        }
        
        .preview-title {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .preview-title::before {
            content: "📸";
            font-size: 1.5rem;
        }
        
        #photoPreview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }
        
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 160px;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        
        #startCamera {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
        }
        
        #captureBtn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            display: none;
        }
        
        #downloadBtn {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
            display: none;
        }
        
        #deleteBtn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            display: none;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }
        
        .status.error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
        }
        
        .status.success {
            background: rgba(50, 255, 100, 0.2);
            border: 1px solid rgba(50, 255, 100, 0.4);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }
        
        /* Animation for capture button */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 65, 108, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 65, 108, 0); }
        }
        
        #captureBtn.capturing {
            animation: pulse 0.8s infinite;
        }
        
        /* Responsive design */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .content {
                padding: 15px;
            }
            
            button {
                padding: 12px 20px;
                font-size: 1rem;
                min-width: 140px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
            }
        }
        
        /* Loading spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #00c6ff;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>摄像头拍照应用</h1>
            <p class="subtitle">即时拍照 · 预览 · 下载 · 管理</p>
        </header>
        
        <div class="content">
            <div class="camera-container">
                <video id="cameraFeed" autoplay playsinline></video>
                <div class="camera-placeholder" id="placeholder">
                    <div class="spinner"></div>
                    <h3>准备就绪</h3>
                    <p>点击下方按钮启动摄像头并开始拍照</p>
                </div>
            </div>
            
            <div class="controls">
                <button id="startCamera">启用摄像头</button>
                <button id="captureBtn">拍照</button>
                <button id="downloadBtn">保存到桌面</button>
                <button id="deleteBtn">删除照片</button>
            </div>
            
            <div class="preview-container" id="previewContainer">
                <div class="preview-title">照片预览</div>
                <img id="photoPreview" alt="照片预览">
            </div>
            
            <div class="status" id="statusMessage">
                <span>等待操作...</span>
            </div>
        </div>
        
        <div class="footer">
            <p>注意：浏览器可能会要求您授权摄像头权限。照片将下载到您的桌面或默认下载位置。</p>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const cameraFeed = document.getElementById('cameraFeed');
        const placeholder = document.getElementById('placeholder');
        const startCameraBtn = document.getElementById('startCamera');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const photoPreview = document.getElementById('photoPreview');
        const previewContainer = document.getElementById('previewContainer');
        const statusMessage = document.getElementById('statusMessage');
        
        // 摄像头流变量
        let cameraStream = null;
        // 拍摄的照片数据
        let capturedImage = null;
        
        // 更新状态消息
        function updateStatus(message, type = 'default') {
            statusMessage.innerHTML = message;
            statusMessage.className = 'status';
            if (type === 'error') {
                statusMessage.classList.add('error');
            } else if (type === 'success') {
                statusMessage.classList.add('success');
            }
        }
        
        // 启动摄像头
        async function startCamera() {
            try {
                updateStatus('正在请求摄像头权限...', 'success');
                placeholder.innerHTML = '<div class="spinner"></div><h3>正在访问摄像头...</h3>';
                
                // 获取摄像头流
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user' // 优先使用前置摄像头
                    },
                    audio: false
                });
                
                // 将流绑定到视频元素
                cameraFeed.srcObject = cameraStream;
                
                // 等待视频加载完成
                await new Promise(resolve => {
                    cameraFeed.onloadedmetadata = () => {
                        cameraFeed.play();
                        resolve();
                    };
                });
                
                // 更新UI
                placeholder.style.display = 'none';
                captureBtn.style.display = 'flex';
                startCameraBtn.disabled = true;
                updateStatus('摄像头已启用！现在可以拍照了。', 'success');
                
            } catch (error) {
                console.error('摄像头访问错误:', error);
                let errorMessage = '无法访问摄像头。';
                
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    errorMessage += ' 您拒绝了摄像头权限请求。请刷新页面并允许权限。';
                } else if (error.name === 'NotFoundError') {
                    errorMessage += ' 未找到摄像头设备。请检查设备连接。';
                } else {
                    errorMessage += ' 请确保浏览器有权限访问摄像头。';
                }
                
                updateStatus(errorMessage, 'error');
                placeholder.innerHTML = '<h3>⚠️ 无法访问摄像头</h3><p>' + errorMessage + '</p>';
            }
        }
        
        // 拍照功能
        function capturePhoto() {
            if (!cameraStream) return;
            
            // 添加视觉反馈
            captureBtn.classList.add('capturing');
            captureBtn.textContent = '拍摄中...';
            
            // 创建canvas元素用于捕获画面
            const canvas = document.createElement('canvas');
            canvas.width = cameraFeed.videoWidth;
            canvas.height = cameraFeed.videoHeight;
            
            const ctx = canvas.getContext('2d');
            
            // 等待一小段时间以确保视觉反馈可见
            setTimeout(() => {
                // 绘制当前视频帧到canvas
                ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);
                
                // 添加时间戳水印
                ctx.font = '20px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.textAlign = 'right';
                ctx.fillText(new Date().toLocaleString(), canvas.width - 20, canvas.height - 20);
                
                // 获取图片数据URL
                capturedImage = canvas.toDataURL('image/png');
                
                // 更新预览
                photoPreview.src = capturedImage;
                previewContainer.classList.add('active');
                
                // 显示下载和删除按钮
                downloadBtn.style.display = 'flex';
                deleteBtn.style.display = 'flex';
                
                // 重置拍照按钮
                captureBtn.classList.remove('capturing');
                captureBtn.textContent = '拍照';
                
                updateStatus('照片拍摄成功！您可以保存或删除照片。', 'success');
            }, 300);
        }
        
        // 模拟下载到桌面
        function downloadImage() {
            if (!capturedImage) return;
            
            updateStatus('准备下载照片...', 'success');
            
            // 创建下载链接
            const a = document.createElement('a');
            a.href = capturedImage;
            
            // 生成文件名（带时间戳）
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            a.download = `camera-photo-${timestamp}.png`;
            
            // 模拟下载过程
            setTimeout(() => {
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                updateStatus('照片已尝试下载！请检查您的桌面或下载文件夹。', 'success');
            }, 500);
        }
        
        // 删除照片
        function deletePhoto() {
            capturedImage = null;
            photoPreview.src = '';
            previewContainer.classList.remove('active');
            downloadBtn.style.display = 'none';
            deleteBtn.style.display = 'none';
            updateStatus('照片已删除。您可以拍摄新照片。');
        }
        
        // 事件监听
        startCameraBtn.addEventListener('click', startCamera);
        captureBtn.addEventListener('click', capturePhoto);
        downloadBtn.addEventListener('click', downloadImage);
        deleteBtn.addEventListener('click', deletePhoto);
        
        // 页面加载时检查浏览器支持
        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                updateStatus('您的浏览器不支持摄像头访问功能。请使用现代浏览器如Chrome、Firefox或Edge。', 'error');
                startCameraBtn.disabled = true;
            } else {
                updateStatus('准备就绪！点击"启用摄像头"按钮开始。');
            }
        });
        
        // 页面关闭时停止摄像头
        window.addEventListener('beforeunload', () => {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
